deployment:
  targets:
    - name: local
      method: docker-compose
      command: "docker-compose up -d"
    - name: production
      method: docker-compose
      command: "docker-compose -f docker-compose.prod.yml up -d"
  compose_files:
    - docker-compose.yml
    - docker-compose.dev.yml
    - docker-compose.prod.yml
